services:
  - type: web
    name: assistar-backend
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

    envVars:
      - key: OPENAI_API_KEY
        sync: false

      - key: MP_ACCESS_TOKEN
        sync: false

      - key: FIREBASE_WEB_API_KEY
        sync: false

      - key: FIREBASE_CREDENTIALS
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false